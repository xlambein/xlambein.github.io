---
layout: default
title: Blog
---
{% for post in site.posts %}
<article>
	<h1><a href="{{ post.url }}">{{ post.title | smartify }}</a></h1>
	<p class="pub-date">{{ post.date | date: '%B %d, %Y' }}</p>
	<p>{{ post.excerpt }}</p>
</article>
{% if forloop.last == false %}
<hr>
{% endif %}
{% endfor %}
